# Runs only manually: `_data/cv.yml` matches the upstream Einstein sample, which RenderCV v2.x rejects (breaking `rendercv render`). Re-enable `push.paths` here after migrating `cv.yml`/settings per https://docs.rendercv.com/.
name: Render a CV
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: |
          pip install -r requirements.txt
      - name: RenderCV
        run: |
          set -euo pipefail
          cv_file=$(find _data -maxdepth 1 -type f \( -name "cv.yaml" -o -name "cv.yml" \))
          if [ -z "$cv_file" ]; then
            echo "No cv.yml file found!"
            exit 1
          fi
          rendercv_dir=$(find assets -maxdepth 1 -type d -name "rendercv")
          if [ -z "$rendercv_dir" ]; then
            echo "No RenderCV config directory found!"
            exit 1
          fi
          settings=$(find "$rendercv_dir" -maxdepth 1 -type f \( -name "settings.yaml" -o -name "settings.yml" \))
          if [ -z "$settings" ]; then
            echo "Missing RenderCV config file!"
            exit 1
          fi
          rendercv render "$cv_file" --settings "$settings"
          find "$rendercv_dir/rendercv_output" -maxdepth 1 -name "*.typ" -delete 2>/dev/null || true
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output
      - name: Push the changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit from RenderCV; skipping push."
          else
            git commit -m "chore: render the latest CV"
            git push
          fi
